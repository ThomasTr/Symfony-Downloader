name: Publish Docker image

on:
    release:
        types: [published]

jobs:
    push_to_registry:
        runs-on: ubuntu-latest

        steps:
            - name: Check out the repo
              uses: actions/checkout@v5

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Extract version
              id: vars
              run: |
                  if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                    echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
                  else
                    echo "VERSION=latest" >> $GITHUB_ENV
                  fi

            - name: Build Docker image
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml build --pull --no-cache

            - name: Tag and push Docker image
              run: |
                  IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/sfdownloader"
                  IMAGE_ID=$(docker images -q "sfdownloader")
                  
                  echo "Built image ID: $IMAGE_ID"
                  echo "Tagging image as ${IMAGE_NAME}:${VERSION}"

                  docker tag "$IMAGE_ID" "${IMAGE_NAME}:${VERSION}"
                  
                  if [ "${VERSION}" != "latest" ]; then
                    docker tag "$IMAGE_ID" "${IMAGE_NAME}:latest"
                  fi
                  
                  # Push Tags
                  docker push "${IMAGE_NAME}:${VERSION}"
                  if [ "${VERSION}" != "latest" ]; then
                    docker push "${IMAGE_NAME}:latest"
                  fi
